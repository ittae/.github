name: Flutter CI (Reusable)

# Reusable workflow — Flutter 프로젝트의 객관 CI 게이트 (build_runner / analyze / test / coverage).
# 분리 배경: claude-code-review.yml이 phase1-ci(객관 CI)와 phase2/3(AI 리뷰)를 동시 보유했으나,
# production Flutter 앱은 secret 디코딩/E2E/build matrix 등 더 풍부한 CI를 자체 워크플로우로 갖고 있어
# 중복이 발생했다. 이 reusable은 통용 객관 CI만 담당하고, AI 리뷰는 claude-code-review.yml이 별도로 처리한다.
#
# 샤딩 (2026-05-13 도입):
#   `flutter test --coverage`가 PR 1회당 ~9분, 전체 CI 시간의 67%를 차지하던 병목.
#   `flutter test --total-shards/--shard-index`로 N개 샤드를 matrix 병렬화하고 lcov를 머지한다.
#   GitHub Actions 사용 분(minutes)은 늘지만 wall-clock(사용자 PR 피드백 시간)은 N배 가깝게 단축.
#   샤드 수는 `test_shards` input으로 조정. analyze / 테스트 누락 검증은 shard 0에서만 실행.
#
# Caller exemplar (Flutter PR Checks):
#   on:
#     pull_request:
#       types: [opened, synchronize, ready_for_review, reopened]
#       paths:
#         - 'lib/**'
#         - 'test/**'
#         - 'pubspec.yaml'
#         - 'pubspec.lock'
#   jobs:
#     ci:
#       permissions:
#         contents: read
#         pull-requests: read
#       uses: ittae/.github/.github/workflows/flutter-ci.yml@main
#       secrets: inherit
#     review:
#       needs: ci
#       permissions:
#         contents: read
#         pull-requests: write
#         issues: write
#         id-token: write
#       uses: ittae/.github/.github/workflows/claude-code-review.yml@main
#       secrets: inherit
#
# 시크릿:
#   - FIREBASE_OPTIONS_DEV_B64 / FIREBASE_OPTIONS_PROD_B64 (선택)
#     → 비어있으면 디코드 skip. Firebase 미사용 repo도 그대로 통용 가능.

on:
  workflow_call:
    inputs:
      flutter_version:
        type: string
        default: '3.41.9'
      coverage_min:
        type: number
        default: 70
      test_required_paths:
        type: string
        default: 'lib/features/[^/]+/(domain/usecases|data/(repositories|datasources))/|lib/core/(utils|errors)/'
      test_exclude_paths:
        type: string
        default: '^lib/main\.dart$|^lib/generated/|\.g\.dart$|\.freezed\.dart$|^lib/core/(constants|theme|router|widgets|l10n)/|/presentation/(widgets|pages)/'
      # 테스트 샤드 매트릭스. 변경 시 reusable caller가 input으로 오버라이드.
      # 형태는 fromJSON 가능한 정수 배열 JSON 문자열.
      test_shards_json:
        type: string
        default: '[0,1,2,3]'
      # 로컬 전체 검증 결과를 커밋한 경우 CI가 무결성을 확인한다.
      # 기본값은 optional이다. artifact가 없으면 기존 full CI가 그대로 gate 역할을 한다.
      local_verify_artifact_path:
        type: string
        default: '.github/local_verify.json'
      local_verify_required:
        type: boolean
        default: false
      local_verify_source_exclude:
        type: string
        default: '.github/local_verify.json'
    outputs:
      coverage:
        description: 'Business-logic line coverage percentage (or "n/a" if no measurable target)'
        value: ${{ jobs.coverage.outputs.coverage }}
      local_verify_status:
        description: 'local_verify attestation status: missing or verified'
        value: ${{ jobs.local_verify_attestation.outputs.status }}
      local_verify_source_hash:
        description: 'Recomputed git-tracked source hash when local_verify is present'
        value: ${{ jobs.local_verify_attestation.outputs.source_hash }}

env:
  PR_NUM: ${{ github.event.pull_request.number }}
  REPO: ${{ github.repository }}
  COVERAGE_MIN: ${{ inputs.coverage_min }}
  TEST_REQUIRED_PATHS: ${{ inputs.test_required_paths }}
  TEST_EXCLUDE_PATHS: ${{ inputs.test_exclude_paths }}

jobs:
  # ---------------------------------------------------------------
  # local_verify artifact attestation. Full CI remains the source of
  # truth unless callers explicitly require the artifact.
  # ---------------------------------------------------------------
  local_verify_attestation:
    name: local_verify attestation
    runs-on: [self-hosted, ittae]
    timeout-minutes: 5
    outputs:
      status: ${{ steps.verify.outputs.status }}
      source_hash: ${{ steps.verify.outputs.source_hash }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: verify
        name: Verify local_verify artifact
        env:
          ARTIFACT_PATH: ${{ inputs.local_verify_artifact_path }}
          REQUIRE_ARTIFACT: ${{ inputs.local_verify_required }}
          SOURCE_EXCLUDE: ${{ inputs.local_verify_source_exclude }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ ! -f "$ARTIFACT_PATH" ]; then
            echo "status=missing" >> "$GITHUB_OUTPUT"
            echo "source_hash=" >> "$GITHUB_OUTPUT"
            if [ "$REQUIRE_ARTIFACT" = "true" ]; then
              echo "::error::local_verify artifact not found: $ARTIFACT_PATH"
              exit 1
            fi
            echo "ℹ️ local_verify artifact 없음 — 기존 full CI로 검증 계속"
            exit 0
          fi

          python3 <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          import sys

          artifact_path = os.environ["ARTIFACT_PATH"]
          expected_repository = os.environ["EXPECTED_REPOSITORY"]
          output_path = os.environ["GITHUB_OUTPUT"]

          def fail(message: str) -> None:
              print(f"::error::{message}")
              sys.exit(1)

          with open(artifact_path, "r", encoding="utf-8") as handle:
              try:
                  artifact = json.load(handle)
              except json.JSONDecodeError as exc:
                  fail(f"local_verify JSON parse failed: {exc}")

          if artifact.get("schema_version") != 1:
              fail("schema_version must be 1")
          if artifact.get("repository") != expected_repository:
              fail(
                  "repository mismatch: "
                  f"{artifact.get('repository')} != {expected_repository}"
              )

          source = artifact.get("source")
          verification = artifact.get("verification")
          if not isinstance(source, dict):
              fail("source must be an object")
          if not isinstance(verification, dict):
              fail("verification must be an object")

          algorithm = source.get("algorithm")
          expected_hash = source.get("hash")
          if algorithm != "git-tracked-sha256-v1":
              fail("source.algorithm must be git-tracked-sha256-v1")
          if not isinstance(expected_hash, str) or len(expected_hash) != 64:
              fail("source.hash must be a 64-character sha256 hex string")

          commands = verification.get("commands")
          tool_versions = verification.get("tool_versions")
          test_manifest = verification.get("test_manifest")
          result_summary = verification.get("result_summary")
          if not isinstance(commands, list) or not commands:
              fail("verification.commands must be a non-empty list")
          if not isinstance(tool_versions, dict) or not tool_versions:
              fail("verification.tool_versions must be a non-empty object")
          if not isinstance(test_manifest, dict):
              fail("verification.test_manifest must be an object")
          if not isinstance(result_summary, dict):
              fail("verification.result_summary must be an object")
          if result_summary.get("status") != "passed":
              fail("verification.result_summary.status must be passed")

          for index, command in enumerate(commands):
              if not isinstance(command, dict):
                  fail(f"verification.commands[{index}] must be an object")
              if not command.get("command"):
                  fail(f"verification.commands[{index}].command is required")
              if command.get("exit_code") != 0:
                  fail(f"verification.commands[{index}].exit_code must be 0")

          test_count = test_manifest.get("test_count")
          if not isinstance(test_count, int) or test_count < 0:
              fail("verification.test_manifest.test_count must be a non-negative integer")
          test_files = test_manifest.get("files")
          if not isinstance(test_files, list):
              fail("verification.test_manifest.files must be a list")

          raw_excludes = os.environ.get("SOURCE_EXCLUDE", "")
          excludes = {artifact_path}
          for item in raw_excludes.replace(",", "\n").splitlines():
              item = item.strip()
              if item:
                  excludes.add(item)

          tracked = subprocess.check_output(["git", "ls-files", "-z"])
          files = []
          for raw_path in tracked.split(b"\0"):
              if not raw_path:
                  continue
              path = raw_path.decode("utf-8")
              if path in excludes:
                  continue
              if not os.path.isfile(path):
                  continue
              files.append(path)

          digest = hashlib.sha256()
          for path in sorted(files):
              digest.update(path.encode("utf-8"))
              digest.update(b"\0")
              with open(path, "rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              digest.update(b"\0")
          actual_hash = digest.hexdigest()

          if actual_hash != expected_hash:
              fail(f"source.hash mismatch: {expected_hash} != {actual_hash}")

          with open(output_path, "a", encoding="utf-8") as output:
              output.write("status=verified\n")
              output.write(f"source_hash={actual_hash}\n")

          print(f"✅ local_verify artifact verified: {artifact_path}")
          print(f"source_hash={actual_hash}")
          PY

  # ---------------------------------------------------------------
  # 테스트 샤드 매트릭스. shard 0이 analyze / 테스트 누락 검증을 겸한다.
  # 각 샤드는 자기 몫의 lcov만 생성하고 coverage job에서 머지.
  # ---------------------------------------------------------------
  flutter-ci:
    name: ci shard ${{ matrix.shard }}
    runs-on: [self-hosted, ittae]
    timeout-minutes: 30
    strategy:
      # 한 샤드 실패해도 다른 샤드는 계속 — 전체 그림을 보고 fix 하기 위함.
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(inputs.test_shards_json) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      # ~/.pub-cache는 subosito/flutter-action의 자체 cache(cache: true)에 위임한다.
      # 두 cache step이 같은 경로를 다른 key로 동시에 cache/restore하면 한쪽이
      # 다른쪽의 archive를 corrupt 상태로 덮어 쓰는 충돌이 발생. flutter-action에
      # 위임하면 SDK + ~/.pub-cache가 통합 관리됨. 우리 cache는 .dart_tool 전용.
      # .dart_tool은 build_runner output + analyzer/generator 산출물이라 SDK
      # 의존성이 강함. Flutter 버전이 바뀌면 옛 .dart_tool은 stale이 되므로
      # cache key에 flutter_version을 포함시켜 SDK별 격리한다.
      - name: Cache .dart_tool (build_runner incremental output)
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-dart-tool-${{ inputs.flutter_version }}-${{ hashFiles('pubspec.lock') }}

      - name: Decode firebase_options (if configured)
        env:
          FIREBASE_OPTIONS_DEV_B64: ${{ secrets.FIREBASE_OPTIONS_DEV_B64 }}
          FIREBASE_OPTIONS_PROD_B64: ${{ secrets.FIREBASE_OPTIONS_PROD_B64 }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DEV_B64" ]; then
            echo "$FIREBASE_OPTIONS_DEV_B64"  | base64 --decode > lib/firebase_options_dev.dart
          fi
          if [ -n "$FIREBASE_OPTIONS_PROD_B64" ]; then
            echo "$FIREBASE_OPTIONS_PROD_B64" | base64 --decode > lib/firebase_options_prod.dart
          fi

      - run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze (warning도 fail)
        if: matrix.shard == 0
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: 비즈니스 로직 파일에 대응 _test.dart 검증
        if: matrix.shard == 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 변경된 .dart 중 (1) 강제 대상이고 (2) 제외 대상이 아닌 것만 필터
          CHANGED=$(gh pr diff "$PR_NUM" -R "$REPO" --name-only \
            | grep -E "$TEST_REQUIRED_PATHS" \
            | grep -vE "$TEST_EXCLUDE_PATHS" || true)

          if [ -z "$CHANGED" ]; then
            echo "✅ 비즈니스 로직 변경 없음 — 테스트 검증 skip"
            exit 0
          fi

          echo "📝 테스트 강제 대상:"
          echo "$CHANGED"

          MISSING=""
          for f in $CHANGED; do
            t=$(echo "$f" | sed 's|^lib/|test/|; s|\.dart$|_test.dart|')
            if [ ! -f "$t" ]; then
              MISSING="${MISSING}- ${f} → ${t}\n"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "❌ 다음 비즈니스 로직 파일에 대응 테스트 누락:"
            echo -e "$MISSING"
            echo ""
            echo "강제 대상: domain/usecases, data/repositories, data/datasources, core/utils, core/errors"
            echo "제외: generated/, *.g.dart, *.freezed.dart, constants/, theme/, router/, widgets/, presentation/{widgets,pages}/"
            exit 1
          fi
          echo "✅ 모든 비즈니스 로직 파일에 테스트 존재"

      - name: flutter test --coverage (shard ${{ matrix.shard }})
        env:
          TOTAL_SHARDS: ${{ strategy.job-total }}
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          # `flutter test` 기본 대상은 `test/` 디렉터리(integration_test 제외).
          # --total-shards / --shard-index로 dart test의 sharding을 활용.
          flutter test --coverage \
            --total-shards="$TOTAL_SHARDS" \
            --shard-index="$SHARD_INDEX" \
            test/

      - name: Stage shard lcov
        if: always() && hashFiles('coverage/lcov.info') != ''
        run: |
          mkdir -p coverage-shard
          mv coverage/lcov.info "coverage-shard/lcov-${{ matrix.shard }}.info"

      - name: Upload shard lcov
        if: always() && hashFiles('coverage-shard/lcov-*.info') != ''
        uses: actions/upload-artifact@v4
        with:
          name: lcov-shard-${{ matrix.shard }}
          path: coverage-shard/lcov-${{ matrix.shard }}.info
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------
  # 모든 샤드 lcov를 머지해 비즈니스 로직 coverage 게이트를 검증.
  # flutter-ci가 실패해도 coverage 결과 자체는 가능한 만큼 산출 시도.
  # ---------------------------------------------------------------
  coverage:
    name: coverage gate
    needs: flutter-ci
    if: ${{ !cancelled() }}
    runs-on: [self-hosted, ittae]
    timeout-minutes: 15
    outputs:
      coverage: ${{ steps.cov.outputs.coverage }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all shard lcov artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lcov-shard-*
          path: coverage-shards
          merge-multiple: true

      - name: Install lcov
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends lcov

      - name: Merge lcov
        run: |
          mkdir -p coverage
          # `-a`로 입력 lcov를 누적 add. 동일 source의 DA 라인은 lcov가 hit 합산 처리.
          ARGS=()
          for f in coverage-shards/lcov-*.info; do
            [ -f "$f" ] || continue
            ARGS+=("-a" "$f")
          done
          if [ "${#ARGS[@]}" -eq 0 ]; then
            echo "❌ 어떤 샤드도 lcov를 생성하지 못했습니다."
            exit 1
          fi
          lcov "${ARGS[@]}" -o coverage/lcov.info
          echo "Merged $(printf '%s\n' "${ARGS[@]}" | grep -c '^-a$') shard lcov files"

      - id: cov
        name: Coverage 검증 (비즈니스 로직만, ≥${{ env.COVERAGE_MIN }}%)
        run: |
          if [ ! -f coverage/lcov.info ]; then echo "no lcov.info"; exit 1; fi

          # 측정 대상: usecases + repositories + utils + errors.
          # datasources는 platform mock 시간 cost 큼, 측정에서 제외 (강제는 유지).
          awk '
            /^SF:/ {
              path = substr($0, 4)
              is_target = path ~ /lib\/features\/[^\/]+\/(domain\/usecases|data\/repositories)\// \
                       || path ~ /lib\/core\/(utils|errors)\//
              is_excluded = path ~ /\.g\.dart$/ || path ~ /\.freezed\.dart$/
              keep = (is_target && !is_excluded)
            }
            keep && /^DA:/ {
              found++
              n = split($0, parts, ",")
              if (parts[2] != "0") hit++
            }
            END {
              printf "%d %d\n", hit, found
            }
          ' coverage/lcov.info > /tmp/cov.txt
          read -r LINES_HIT LINES_FOUND < /tmp/cov.txt

          if [ "${LINES_FOUND:-0}" -eq 0 ]; then
            echo "ℹ️ 비즈니스 로직 변경 없음 또는 측정 대상 없음 — coverage 검증 skip"
            echo "coverage=n/a" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PERCENT=$((LINES_HIT * 100 / LINES_FOUND))
          echo "coverage=$PERCENT" >> "$GITHUB_OUTPUT"
          echo "비즈니스 로직 Coverage: ${PERCENT}% (${LINES_HIT}/${LINES_FOUND})"
          echo "측정 대상: domain/usecases, data/repositories, core/utils, core/errors (datasources는 강제 대상이지만 측정에서 제외)"
          if [ "$PERCENT" -lt "$COVERAGE_MIN" ]; then
            echo "❌ 비즈니스 로직 Coverage ${PERCENT}% < ${COVERAGE_MIN}%"; exit 1
          fi
