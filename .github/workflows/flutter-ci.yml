name: Flutter CI (Reusable)

# Reusable workflow — Flutter 프로젝트의 객관 CI 게이트 (build_runner / analyze / test / coverage).
# 분리 배경: claude-code-review.yml이 phase1-ci(객관 CI)와 phase2/3(AI 리뷰)를 동시 보유했으나,
# production Flutter 앱은 secret 디코딩/E2E/build matrix 등 더 풍부한 CI를 자체 워크플로우로 갖고 있어
# 중복이 발생했다. 이 reusable은 통용 객관 CI만 담당하고, AI 리뷰는 claude-code-review.yml이 별도로 처리한다.
#
# Caller exemplar (Flutter PR Checks):
#   on:
#     pull_request:
#       types: [opened, synchronize, ready_for_review, reopened]
#       paths:
#         - 'lib/**'
#         - 'test/**'
#         - 'pubspec.yaml'
#         - 'pubspec.lock'
#   jobs:
#     ci:
#       permissions:
#         contents: read
#         pull-requests: read
#       uses: ittae/.github/.github/workflows/flutter-ci.yml@main
#       secrets: inherit
#     review:
#       needs: ci
#       permissions:
#         contents: read
#         pull-requests: write
#         issues: write
#         id-token: write
#       uses: ittae/.github/.github/workflows/claude-code-review.yml@main
#       secrets: inherit
#
# 시크릿:
#   - FIREBASE_OPTIONS_DEV_B64 / FIREBASE_OPTIONS_PROD_B64 (선택)
#     → 비어있으면 디코드 skip. Firebase 미사용 repo도 그대로 통용 가능.

on:
  workflow_call:
    inputs:
      flutter_version:
        type: string
        default: '3.41.9'
      coverage_min:
        type: number
        default: 70
      test_required_paths:
        type: string
        default: 'lib/features/[^/]+/(domain/usecases|data/(repositories|datasources))/|lib/core/(utils|errors)/'
      test_exclude_paths:
        type: string
        default: '^lib/main\.dart$|^lib/generated/|\.g\.dart$|\.freezed\.dart$|^lib/core/(constants|theme|router|widgets|l10n)/|/presentation/(widgets|pages)/'
    outputs:
      coverage:
        description: 'Business-logic line coverage percentage (or "n/a" if no measurable target)'
        value: ${{ jobs.flutter-ci.outputs.coverage }}

env:
  PR_NUM: ${{ github.event.pull_request.number }}
  REPO: ${{ github.repository }}
  COVERAGE_MIN: ${{ inputs.coverage_min }}
  TEST_REQUIRED_PATHS: ${{ inputs.test_required_paths }}
  TEST_EXCLUDE_PATHS: ${{ inputs.test_exclude_paths }}

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.cov.outputs.coverage }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      # ~/.pub-cache는 subosito/flutter-action의 자체 cache(cache: true)에 위임한다.
      # 두 cache step이 같은 경로를 다른 key로 동시에 cache/restore하면 한쪽이
      # 다른쪽의 archive를 corrupt 상태로 덮어 쓰는 충돌이 발생. flutter-action에
      # 위임하면 SDK + ~/.pub-cache가 통합 관리됨. 우리 cache는 .dart_tool 전용.
      # .dart_tool은 build_runner output + analyzer/generator 산출물이라 SDK
      # 의존성이 강함. Flutter 버전이 바뀌면 옛 .dart_tool은 stale이 되므로
      # cache key에 flutter_version을 포함시켜 SDK별 격리한다.
      - name: Cache .dart_tool (build_runner incremental output)
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-dart-tool-${{ inputs.flutter_version }}-${{ hashFiles('pubspec.lock') }}

      - name: Decode firebase_options (if configured)
        env:
          FIREBASE_OPTIONS_DEV_B64: ${{ secrets.FIREBASE_OPTIONS_DEV_B64 }}
          FIREBASE_OPTIONS_PROD_B64: ${{ secrets.FIREBASE_OPTIONS_PROD_B64 }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DEV_B64" ]; then
            echo "$FIREBASE_OPTIONS_DEV_B64"  | base64 --decode > lib/firebase_options_dev.dart
          fi
          if [ -n "$FIREBASE_OPTIONS_PROD_B64" ]; then
            echo "$FIREBASE_OPTIONS_PROD_B64" | base64 --decode > lib/firebase_options_prod.dart
          fi

      - run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze (warning도 fail)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: 비즈니스 로직 파일에 대응 _test.dart 검증
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 변경된 .dart 중 (1) 강제 대상이고 (2) 제외 대상이 아닌 것만 필터
          CHANGED=$(gh pr diff "$PR_NUM" -R "$REPO" --name-only \
            | grep -E "$TEST_REQUIRED_PATHS" \
            | grep -vE "$TEST_EXCLUDE_PATHS" || true)

          if [ -z "$CHANGED" ]; then
            echo "✅ 비즈니스 로직 변경 없음 — 테스트 검증 skip"
            exit 0
          fi

          echo "📝 테스트 강제 대상:"
          echo "$CHANGED"

          MISSING=""
          for f in $CHANGED; do
            t=$(echo "$f" | sed 's|^lib/|test/|; s|\.dart$|_test.dart|')
            if [ ! -f "$t" ]; then
              MISSING="${MISSING}- ${f} → ${t}\n"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "❌ 다음 비즈니스 로직 파일에 대응 테스트 누락:"
            echo -e "$MISSING"
            echo ""
            echo "강제 대상: domain/usecases, data/repositories, data/datasources, core/utils, core/errors"
            echo "제외: generated/, *.g.dart, *.freezed.dart, constants/, theme/, router/, widgets/, presentation/{widgets,pages}/"
            exit 1
          fi
          echo "✅ 모든 비즈니스 로직 파일에 테스트 존재"

      - name: flutter test --coverage
        run: flutter test --coverage

      - id: cov
        name: Coverage 검증 (비즈니스 로직만, ≥${{ env.COVERAGE_MIN }}%)
        run: |
          if [ ! -f coverage/lcov.info ]; then echo "no lcov.info"; exit 1; fi

          # 측정 대상: usecases + repositories + utils + errors.
          # datasources는 platform mock 시간 cost 큼, 측정에서 제외 (강제는 유지).
          awk '
            /^SF:/ {
              path = substr($0, 4)
              is_target = path ~ /lib\/features\/[^\/]+\/(domain\/usecases|data\/repositories)\// \
                       || path ~ /lib\/core\/(utils|errors)\//
              is_excluded = path ~ /\.g\.dart$/ || path ~ /\.freezed\.dart$/
              keep = (is_target && !is_excluded)
            }
            keep && /^DA:/ {
              found++
              n = split($0, parts, ",")
              if (parts[2] != "0") hit++
            }
            END {
              printf "%d %d\n", hit, found
            }
          ' coverage/lcov.info > /tmp/cov.txt
          read LINES_HIT LINES_FOUND < /tmp/cov.txt

          if [ "${LINES_FOUND:-0}" -eq 0 ]; then
            echo "ℹ️ 비즈니스 로직 변경 없음 또는 측정 대상 없음 — coverage 검증 skip"
            echo "coverage=n/a" >> $GITHUB_OUTPUT
            exit 0
          fi

          PERCENT=$((LINES_HIT * 100 / LINES_FOUND))
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT
          echo "비즈니스 로직 Coverage: ${PERCENT}% (${LINES_HIT}/${LINES_FOUND})"
          echo "측정 대상: domain/usecases, data/repositories, core/utils, core/errors (datasources는 강제 대상이지만 측정에서 제외)"
          if [ "$PERCENT" -lt "$COVERAGE_MIN" ]; then
            echo "❌ 비즈니스 로직 Coverage ${PERCENT}% < ${COVERAGE_MIN}%"; exit 1
          fi
