name: Claude Mention Responder (Light — Stack Agnostic)

# Lightweight reusable — @claude 멘션 응답 (Flutter setup 없음).
# 모든 stack 적용 가능. Claude가 필요 시 자체 install/build 수행.
#
# Caller exemplar:
#   on:
#     issue_comment:
#       types: [created]
#     pull_request_review_comment:
#       types: [created]
#     pull_request_review:
#       types: [submitted]
#   jobs:
#     call:
#       permissions:
#         contents: write
#         pull-requests: write
#         issues: write
#         id-token: write
#       uses: ittae/.github/.github/workflows/claude-mention-light.yml@main
#       secrets: inherit
#
# 보안:
#   - association 'OWNER'/'MEMBER'/'COLLABORATOR'만 응답 (외부 PR mention 무시)
#   - bot author 무시 (loop 방지)

on:
  workflow_call: {}

jobs:
  claude-response:
    # @claude 멘션 + 권한 있는 author + 사람만
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      ) &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR'
      ) &&
      github.event.sender.type != 'Bot'
    runs-on: [self-hosted, ittae]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-7 --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(git:*),Bash(npm:*),Bash(bun:*),Bash(pnpm:*),Bash(yarn:*),Bash(node:*),Bash(npx:*),Bash(python:*),Bash(pip:*),Bash(uv:*),Bash(go:*),Bash(cargo:*),Bash(make:*),Bash(echo:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(find:*),Edit,Write,Read,Glob"'
