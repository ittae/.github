name: Claude Mention Responder (Reusable — Flutter)

# Reusable workflow — @claude 멘션 응답.
# Caller exemplar:
#   on:
#     issue_comment:
#       types: [created]
#     pull_request_review_comment:
#       types: [created]
#     pull_request_review:
#       types: [submitted]
#   jobs:
#     call:
#       uses: ittae/.github/.github/workflows/claude-mention.yml@main
#       secrets: inherit
#
# 보안:
#   - association 'OWNER'/'MEMBER'/'COLLABORATOR'만 응답 (외부 PR mention 무시)
#   - bot author 무시 (loop 방지)

on:
  workflow_call:
    inputs:
      flutter_version:
        type: string
        default: '3.41.9'

jobs:
  claude-response:
    # @claude 멘션 + 권한 있는 author + 사람만
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      ) &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR'
      ) &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Cache pub + dart_tool
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-7 --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(git:*),Bash(flutter:*),Bash(dart:*),Bash(echo:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(find:*),Edit,Write,Read,Glob"'
